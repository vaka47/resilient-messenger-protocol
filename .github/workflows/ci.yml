name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    name: Node.js tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Run tests
        run: npm test
